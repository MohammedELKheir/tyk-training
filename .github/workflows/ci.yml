name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate metadata and internal references
        run: npm run validate

      - name: Build catalog artifacts
        run: npm run build:catalog

      - name: Build changed publishable Slidev decks
        if: github.event_name == 'pull_request'
        run: npm run build:decks:changed -- --concurrency=4

      - name: Build all publishable Slidev decks
        if: github.event_name != 'pull_request'
        run: npm run build:decks -- --concurrency=4

      - name: Run test suite
        if: github.event_name != 'pull_request'
        run: npm test

      - name: Run test suite without full-site publish checks
        if: github.event_name == 'pull_request'
        run: npm run test:ci:changed

      - name: Build GitHub Pages site scaffold
        if: github.event_name != 'pull_request'
        run: npm run build:site
